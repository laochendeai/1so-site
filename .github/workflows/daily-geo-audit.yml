name: Daily GEO Audit

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run GEO audit
        run: node scripts/geo-audit.mjs
        env:
          SITE_URL: https://1so.org

      - name: Create daily issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const today = new Date().toISOString().slice(0, 10);
            const title = `Daily GEO audit: ${today}`;
            const body = fs.readFileSync("geo-audit-report.md", "utf8");
            const { owner, repo } = context.repo;
            const variableName = "GEO_AUDIT_LAST_ISSUE";
            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            };
            await ensureLabel("geo-audit", "1f7a4d", "Automated GEO audit reports");
            await ensureLabel("daily-task", "315d96", "Daily site improvement task");

            let cached = null;
            try {
              const variable = await github.rest.actions.getRepoVariable({ owner, repo, name: variableName });
              cached = JSON.parse(variable.data.value);
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (cached && cached.date === today && cached.issue_number) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: cached.issue_number,
                title,
                body,
                state: "open"
              });
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["geo-audit", "daily-task"]
            });
            if (!created.data.number) {
              throw new Error("GitHub did not return an issue number for the daily GEO audit.");
            }

            const value = JSON.stringify({ date: today, issue_number: created.data.number });
            try {
              await github.rest.actions.updateRepoVariable({ owner, repo, name: variableName, value });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.actions.createRepoVariable({ owner, repo, name: variableName, value });
            }
